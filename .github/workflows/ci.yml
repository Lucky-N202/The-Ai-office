name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-typecheck-build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/the_ai_office
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/the_ai_office
      NEXT_PUBLIC_SITE_URL: https://theaioffice.app
      AUTH_SECRET: ci-only-placeholder-secret
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: the_ai_office
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Seed test DB
        run: npm run db:seed

      - name: Build
        run: npm run build
